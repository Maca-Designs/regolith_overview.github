<!DOCTYPE html>
<html>
<head>
<style>
/* styles.css */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background-color: #ffffff;
    color: #000000;
    line-height: 1.6;
}

header {
    background-color: rgb(102, 183, 161);
    color: white;
    padding: 2rem;
    text-align: center;
}

header h1 {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
}

header p {
    font-size: 1.2rem;
    opacity: 0.9;
}

.search-container {
    max-width: 1200px;
    margin: 2rem auto;
    padding: 0 1rem;
}

#searchInput {
    width: 100%;
    padding: 1rem 1.5rem;
    font-size: 1.1rem;
    border: 2px solid rgb(102, 183, 161);
    border-radius: 50px;
    outline: none;
    transition: border-color 0.3s;
}

#searchInput:focus {
    border-color: #000;
}

.templates-grid {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 1rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 2rem;
}

.preview-img {
    width: 100%;
    height: 120px;
    object-fit: cover;
    border-radius: 8px;
    margin: 1rem 0;
}

.template-card {
    background: white;
    border: 2px solid rgb(102, 183, 161);
    border-radius: 12px;
    padding: 1.5rem;
    text-decoration: none;
    color: inherit;
    transition: transform 0.2s, box-shadow 0.2s;
    display: block;
}

.template-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(102, 183, 161, 0.3);
}

.template-card h3 {
    color: rgb(102, 183, 161);
    margin-bottom: 0.5rem;
    font-size: 1.3rem;
}

.template-card p {
    color: #333;
    margin-bottom: 1rem;
}

.template-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 1rem;
}

.total-files {
    color: rgb(102, 183, 161);
    font-weight: 500;
    font-size: 1rem;
}

.namespace-download {
    border: none;
    cursor: pointer;
    display: inline-block;
    background: rgb(102, 183, 161);
    color: white;
    padding: 0.5rem 1rem;
    border-radius: 20px;
    font-weight: bold;
    font-size: 0.9rem;
}

.namespace-download:hover {
    background: rgb(90, 160, 140);
}

.download-btn {
    display: inline-block;
    background: rgb(102, 183, 161);
    color: white;
    padding: 0.5rem 1rem;
    border-radius: 20px;
    font-weight: bold;
    font-size: 0.9rem;
}

.header-content {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 1rem;
}

.header-left, .header-right {
    flex: 0 0 auto;
}

.header-center {
    flex: 1;
    text-align: center;
}

.readme-btn {
    background: rgba(255,255,255,0.2);
    color: white;
    border: 2px solid rgba(255,255,255,0.3);
    padding: 0.5rem 1rem;
    border-radius: 20px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s;
}

.readme-btn:hover {
    background: rgba(255,255,255,0.3);
    transform: translateY(-1px);
}

.readme-viewer {
    max-width: 1200px;
    margin: 2rem auto;
    padding: 0 1rem;
    display: none;
}

.readme-content {
    background: white;
    border: 2px solid rgb(102, 183, 161);
    border-radius: 12px;
    padding: 2rem;
    max-height: 70vh;
    overflow-y: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.readme-content h1, .readme-content h2, .readme-content h3 {
    color: rgb(102, 183, 161);
    margin-top: 1.5rem;
    margin-bottom: 0.5rem;
}

.readme-content h1:first-child {
    margin-top: 0;
}

.readme-content p, .readme-content li {
    line-height: 1.7;
    margin-bottom: 1rem;
}

.readme-content code {
    background: rgba(102, 183, 161, 0.1);
    padding: 0.2rem 0.4rem;
    border-radius: 4px;
    font-family: 'Courier New', monospace;
}

.readme-content pre {
    background: rgba(102, 183, 161, 0.05);
    padding: 1rem;
    border-radius: 8px;
    overflow-x: auto;
}

.readme-content blockquote {
    border-left: 4px solid rgb(102, 183, 161);
    padding-left: 1rem;
    margin: 1rem 0;
    font-style: italic;
    color: #555;
}

.back-btn {
    background: rgb(102, 183, 161);
    color: white;
    border: none;
    padding: 0.75rem 1.5rem;
    border-radius: 25px;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 1rem;
}

.back-btn:hover {
    background: rgb(90, 160, 140);
}

@media (max-width: 768px) {
    .templates-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
    }
    
    header h1 {
        font-size: 2rem;
    }
}

</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>

<header>
    <div class="header-content">
        <div class="header-left">
            <button id="readmeBtn" class="readme-btn">📖 Guide</button>
        </div>
        <div class="header-center">
            <h1>Template Files</h1>
            <p>Browse and download templates from the repo.</p>
        </div>
        <div class="header-right"></div>
    </div>
</header>
    
    <main>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search templates...">
        </div>
        <div class="templates-grid" id="templatesGrid">
            <!-- Cards will appear here -->
        </div>
        <div class="readme-viewer" id="readmeViewer">
    <div class="readme-content" id="readmeContent">
        <div id="readmeMarkdown">Loading README...</div>
    </div>
</div>
    </main>
<script>
    // Load README first
    async function loadReadme() {
        try {
            const readmeResponse = await fetch('https://raw.githubusercontent.com/Maca-Designs/regolith_overview.github/main/README.md');
            const readmeText = await readmeResponse.text();
            const htmlContent = markdownToHtml(readmeText);
            document.getElementById('readmeContent').innerHTML = htmlContent;
        } catch (error) {
            document.getElementById('readmeMarkdown').innerHTML = '<p>README not found. Make sure README.md exists in your repo root.</p>';
        }
    }

    // Simple Markdown to HTML converter
    function markdownToHtml(markdown) {
        let html = markdown;
        
        // 1. FIRST: Handle code blocks (JSON, etc.) - preserve them intact
        html = html.replace(/```(?:json)?\s*\n([\s\S]*?)\n```/g, function(match, code) {
            return `<pre><code class="language-json">${escapeHtml(code.trim())}</code></pre>`;
        });
        
        // 2. THEN handle inline code (single backticks)
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        
        // 3. Headers (after code blocks so they don't interfere)
        html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^# (.*$)/gim, '<h1>$1</h1>');
        
        // 4. Bold/Italic
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>');
        
        // 5. Blockquotes
        html = html.replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>');
        
        // 6. Lists
        html = html.replace(/^\s*- (.*$)/gim, '<li>$1</li>')
                .replace(/(<li>.*<\/li>)/gi, '<ul>$1</ul>');
        
        // 7. Paragraphs and breaks
        html = html.replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');
        
        html = html.replace(/^(.+)$/gim, '<p>$1</p>')
                .replace(/<\/p><p>\s*<\/p>/g, '');
        
        return html;
    }

    // Add HTML escape helper for code blocks
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
document.addEventListener('DOMContentLoaded', async function() {
    const readmeBtn = document.getElementById('readmeBtn');
    const readmeViewer = document.getElementById('readmeViewer');
    const searchContainer = document.querySelector('.search-container');
    const templatesGrid = document.getElementById('templatesGrid');
    
    let isReadmeOpen = false;
    
    readmeBtn.addEventListener('click', async () => {
        if (!isReadmeOpen) {
            // Open README
            await loadReadme();
            readmeViewer.style.display = 'block';
            searchContainer.style.display = 'none';
            templatesGrid.style.display = 'none';
            readmeBtn.textContent = '← Back to Templates';
            readmeBtn.style.background = 'rgba(255,100,100,0.3)';
            isReadmeOpen = true;
        } else {
            // Close README
            readmeViewer.style.display = 'none';
            searchContainer.style.display = 'block';
            templatesGrid.style.display = 'grid';
            readmeBtn.textContent = '📖 Guide';
            readmeBtn.style.background = 'rgba(255,255,255,0.2)';
            isReadmeOpen = false;
        }
    });
    const repo = 'regolith_overview.github';
    const org = 'Maca-Designs';
    
    // Store template data globally for download function
    window.templateData = [];
    
    try {
        const apiUrl = `https://api.github.com/repos/${org}/${repo}/contents/templates`;
        const listResponse = await fetch(apiUrl);
        const foldersData = await listResponse.json();
        
        const grid = document.getElementById('templatesGrid');
        const folders = foldersData.filter(item => item.type === 'dir').map(item => item.name);
        
        for (const folder of folders) {
            try {
                const configUrl = `https://raw.githubusercontent.com/${org}/${repo}/main/templates/${folder}/${folder}-config.json`;
                const configResponse = await fetch(configUrl);
                if (!configResponse.ok) throw new Error('Config not found');
                
                const config = await configResponse.json();
                
                // Store full folder data for download
                const folderData = {
                    name: folder,
                    config: config,
                    apiPath: `templates/${folder}`
                };
                window.templateData.push(folderData);
                
                const card = createTemplateCard(folderData, async () => {
                    await downloadTemplateWithNamespace(folderData);
                });
                
                grid.appendChild(card);
            } catch (e) {
                console.warn(`Skipping ${folder} - no config.json`);
            }
        }
    } catch (error) {
        console.error('Failed to load templates:', error);
        grid.innerHTML = '<p>Failed to load templates. Check console for details.</p>';
    }
});

function createTemplateCard(folderData, onDownloadClick) {
    const card = document.createElement('a');
    card.className = 'template-card';
    
    const categories = folderData.config.categories || {};
    const totalFiles = folderData.config.totalFiles || Object.values(categories).reduce((sum, cat) => sum + cat.length, 0);
    
    card.innerHTML = `
        <h3>${folderData.config.name || folderData.name}</h3>
        <p>${folderData.config.description}</p>
        <div class="template-meta">
            <span class="total-files">${totalFiles} files</span>
            <button class="download-btn namespace-download" data-folder="${folderData.name}">Download Pack</button>
        </div>
    `;
    
    // Add click handler
    card.querySelector('.namespace-download').addEventListener('click', (e) => {
        e.preventDefault();
        onDownloadClick();
    });
    
    return card;
}

async function downloadTemplateWithNamespace(folderData) {
    const newNamespace = prompt('Enter new namespace (or press Cancel for original):', 'maca_user');
    if (!newNamespace) return; // User cancelled
    
    const zip = new JSZip();
    const org = 'Maca-Designs';
    const repo = 'regolith_overview.github';
    
    try {
        // 1. Recursively fetch ALL files in the template folder
        const files = await fetchFolderContents(zip, folderData.apiPath, '', org, repo, newNamespace);
        
        // 2. Generate zip filename
        const zipName = `${folderData.name}_${newNamespace}.zip`;
        
        // 3. Download
        await zip.generateAsync({type: 'blob'}).then(blob => {
            saveAs(blob, zipName);
        });
        
        console.log(`Downloaded ${files.length} files with namespace "${newNamespace}"`);
    } catch (error) {
        console.error('Download failed:', error);
        alert('Download failed. Check console for details.');
    }
}

async function fetchFolderContents(zip, apiPath, relativePath, org, repo, newNamespace) {
    const apiUrl = `https://api.github.com/repos/${org}/${repo}/contents/${apiPath}`;
    const response = await fetch(apiUrl);
    const items = await response.json();
    
    const allFiles = [];
    
    for (const item of items) {
        if (item.type === 'file') {
            // Download and process file
            const fileContent = await fetch(item.download_url).then(r => r.text());
            
            // Replace namespace: maca_templ → newNamespace
            let processedContent = fileContent.replace(/maca_templ/g, newNamespace);
            
            // Add to zip
            const filePath = relativePath ? `${relativePath}/${item.name}` : item.name;
            zip.file(filePath, processedContent);
            
            allFiles.push(item.name);
        } else if (item.type === 'dir') {
            // Recursively process subfolder
            const subFiles = await fetchFolderContents(
                zip, 
                `${apiPath}/${item.name}`, 
                relativePath ? `${relativePath}/${item.name}` : item.name,
                org, 
                repo, 
                newNamespace
            );
            allFiles.push(...subFiles);
        }
    }
    
    return allFiles;
}
</script>

</body>
</html>
