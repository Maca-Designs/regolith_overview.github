<!DOCTYPE html>
<html>
<head>
<style>
/* styles.css */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background-color: #ffffff;
    color: #000000;
    line-height: 1.6;
}

header {
    background-color: rgb(102, 183, 161);
    color: white;
    padding: 2rem;
    text-align: center;
}

header h1 {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
}

header p {
    font-size: 1.2rem;
    opacity: 0.9;
}

.search-container {
    max-width: 1200px;
    margin: 2rem auto;
    padding: 0 1rem;
}

#searchInput {
    width: 100%;
    padding: 1rem 1.5rem;
    font-size: 1.1rem;
    border: 2px solid rgb(102, 183, 161);
    border-radius: 50px;
    outline: none;
    transition: border-color 0.3s;
}

#searchInput:focus {
    border-color: #000;
}

.templates-grid {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 1rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 2rem;
}

.template-card {
    background: white;
    border: 2px solid rgb(102, 183, 161);
    border-radius: 12px;
    padding: 1.5rem;
    text-decoration: none;
    color: inherit;
    transition: transform 0.2s, box-shadow 0.2s;
    display: block;
}

.template-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(102, 183, 161, 0.3);
}

.template-card h3 {
    color: rgb(102, 183, 161);
    margin-bottom: 0.5rem;
    font-size: 1.3rem;
}

.template-card p {
    color: #333;
    margin-bottom: 1rem;
}

.download-btn {
    display: inline-block;
    background: rgb(102, 183, 161);
    color: white;
    padding: 0.5rem 1rem;
    border-radius: 20px;
    font-weight: bold;
    font-size: 0.9rem;
}

@media (max-width: 768px) {
    .templates-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
    }
    
    header h1 {
        font-size: 2rem;
    }
}

</style>
</head>
<body>

<header>
        <h1>Template Files</h1>
        <p>Browse and download templates from the repo.</p>
    </header>
    
    <main>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search templates...">
        </div>
        
        <div class="templates-grid" id="templatesGrid">
            <!-- Sample templates; JS will populate/filter these later -->
            <a href="templates/sample1.json" class="template-card" download>
                <h3>Sample Template 1</h3>
                <p>JSON config for basic setup.</p>
                <span class="download-btn">Download</span>
            </a>
            <a href="templates/sample2.html" class="template-card" download>
                <h3>Sample Template 2</h3>
                <p>HTML starter page.</p>
                <span class="download-btn">Download</span>
            </a>
            <a href="templates/sample3.css" class="template-card" download>
                <h3>Sample Template 3</h3>
                <p>CSS stylesheet base.</p>
                <span class="download-btn">Download</span>
            </a>
        </div>
    </main>

</body>
</html>
