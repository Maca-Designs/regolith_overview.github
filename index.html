<!DOCTYPE html>
<html>
<head>
<style>
/* styles.css */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background-color: #ffffff;
    color: #000000;
    line-height: 1.6;
}

header {
    background-color: rgb(102, 183, 161);
    color: white;
    padding: 2rem;
    text-align: center;
}

header h1 {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
}

header p {
    font-size: 1.2rem;
    opacity: 0.9;
}

.search-container {
    max-width: 1200px;
    margin: 2rem auto;
    padding: 0 1rem;
}

#searchInput {
    width: 100%;
    padding: 1rem 1.5rem;
    font-size: 1.1rem;
    border: 2px solid rgb(102, 183, 161);
    border-radius: 50px;
    outline: none;
    transition: border-color 0.3s;
}

#searchInput:focus {
    border-color: #000;
}

.templates-grid {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 1rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 2rem;
}

.preview-img {
    width: 100%;
    height: 120px;
    object-fit: cover;
    border-radius: 8px;
    margin: 1rem 0;
}

.template-card {
    background: white;
    border: 2px solid rgb(102, 183, 161);
    border-radius: 12px;
    padding: 1.5rem;
    text-decoration: none;
    color: inherit;
    transition: transform 0.2s, box-shadow 0.2s;
    display: block;
}

.template-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(102, 183, 161, 0.3);
}

.template-card h3 {
    color: rgb(102, 183, 161);
    margin-bottom: 0.5rem;
    font-size: 1.3rem;
}

.template-card p {
    color: #333;
    margin-bottom: 1rem;
}

.template-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 1rem;
}

.total-files {
    color: rgb(102, 183, 161);
    font-weight: 500;
    font-size: 1rem;
}

.download-btn {
    display: inline-block;
    background: rgb(102, 183, 161);
    color: white;
    padding: 0.5rem 1rem;
    border-radius: 20px;
    font-weight: bold;
    font-size: 0.9rem;
}

@media (max-width: 768px) {
    .templates-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
    }
    
    header h1 {
        font-size: 2rem;
    }
}

</style>
</head>
<body>

<header>
        <h1>Template Files</h1>
        <p>Browse and download templates from the repo.</p>
    </header>
    
    <main>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search templates...">
        </div>
    </main>
<script>
document.addEventListener('DOMContentLoaded', async function() {
    try {
        const repo = 'regolith_overview.github';
        
        // 1. Get list of template folders from /templates/
        const apiUrl = `https://api.github.com/repos/Maca-Designs/${repo}/contents/templates`;
        const listResponse = await fetch(apiUrl);
        const foldersData = await listResponse.json();
        
        const grid = document.getElementById('templatesGrid');
        
        // 2. Filter folders only (skip files)
        const folders = foldersData.filter(item => item.type === 'dir').map(item => item.name);
        
        // 3. For each folder, load its config.json
        for (const folder of folders) {
                const configUrl = `https://raw.githubusercontent.com/Maca-Designs/${repo}/main/templates/${folder}/${folder}-config.json`;
                const configResponse = await fetch(configUrl);
                
                if (!configResponse.ok) throw new Error('Config not found');
                
                const config = await configResponse.json();
                
                const card = document.createElement('a');
                card.className = 'template-card';
                card.href = `./templates/${folder}/${folder}-config.json`;
                card.download = `${folder}-config.json`;
                
                // Calculate category counts
                const categories = config.categories || {};
                const totalFiles = config.totalFiles || Object.values(categories).reduce((sum, cat) => sum + cat.length, 0);
                
                card.innerHTML = `
                    <h3>${config.name || folder}</h3>
                    <p>${config.description}</p>
                    <div class="template-meta">
                        <div>
                            <span class="total-files">${totalFiles} files</span>
                            <span class="download-btn">Download</span>
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
        }
    } catch (error) {
        console.error('Failed to load templates:', error);
        document.getElementById('templatesGrid').innerHTML = '<p>Failed to load templates. Check console for details.</p>';
    }
});
</script>

</body>
</html>
